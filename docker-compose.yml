# Legacy local-only compose path.
# Non-canonical for bounded staging server deployment; use docker/staging/docker-compose.staging.yml instead.
services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/data
    working_dir: /data
    environment:
      - PYTHONPATH=/app:/app/src
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app

volumes:
  sqlite_data:
